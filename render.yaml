services:
  - type: web
    name: thl-publishing-website
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    domains:
      - thlarsenpublishing.com
      - www.thlarsenpublishing.com
      - thlarsenpublishing.no
      - www.thlarsenpublishing.no
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
